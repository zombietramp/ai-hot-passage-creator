<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 圆角矩形背景 -->
  <rect x="20" y="20" width="160" height="160" rx="36" ry="36" fill="url(#grad1)" />
  <!-- 笔尖/写作符号 -->
  <path d="M70 130 L100 55 L130 130" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <line x1="78" y1="110" x2="122" y2="110" stroke="white" stroke-width="8" stroke-linecap="round" />
  <!-- AI 光点 -->
  <circle cx="100" cy="55" r="8" fill="url(#grad2)" />
  <!-- 热点脉冲环 -->
  <circle cx="100" cy="55" r="16" fill="none" stroke="white" stroke-width="2" opacity="0.5" />
  <circle cx="100" cy="55" r="24" fill="none" stroke="white" stroke-width="1.5" opacity="0.3" />
  <!-- 底部文字线条（代表文章） -->
  <line x1="65" y1="145" x2="95" y2="145" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7" />
  <line x1="100" y1="145" x2="135" y2="145" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5" />
</svg>
